[screws_tilt_adjust]
screw1: 0, 5
screw1_name: front left screw
screw2: 186, 5
screw2_name: front right screw
screw3: 186, 195
screw3_name: rear right screw
screw4: 0, 195
screw4_name: rear left screw
horizontal_move_z: 10.
speed: 50.
screw_thread: CW-M3 


[force_move]
enable_force_move: True

[firmware_retraction]
retract_length: 0.5      # Retraction distance in mm (adjust for Bowden)
retract_speed: 60         # Speed of retraction (mm/s)
unretract_extra_length: 0 # Extra filament pushed back after unretraction
unretract_speed: 30       # Speed of unretraction (mm/s)

[include moonraker_obico_macros.cfg]

