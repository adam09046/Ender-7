# This file contains pin mappings for the stock 2021 Creality Ender 7.
# To use this config, during "make menuconfig" select as below: 

# Klipper Firmware Configuration with Stock Touch screen
# [*] Enable extra low-level configuration options
#    Micro-controller A rchitecture (STMicroelectronics STM32)  --->
#    Processor model (STM32F103)  --->
# [ ] Only 10KiB of RAM (for rare stm32f103x6 variant) (NEW)
# [ ] Disable SWD at startup (for GigaDevice stm32f103 clones) (NEW)
#     Bootloader offset (28KiB bootloader)  --->
#     Clock Reference (8 MHz crystal)  --->
#     Communication interface (Serial (on USART1 PA10/PA9))  --->
# (250000) Baud rate for serial port
# (!PA15) GPIO pins to set at micro-controller startup

# This file contains pin mappings for the stock 2021 Creality Ender 7.
# To use this config, during "make menuconfig" select the
# STM32F103 with a "28KiB bootloader" and serial (on USART1 PA10/PA9)
# communication.

# If you prefer a direct serial connection, in "make menuconfig"
# select "Enable extra low-level configuration options" and select
# serial (on USART3 PB11/PB10), which is broken out on the 10 pin IDC
# cable used for the LCD module as follows:
# 3: Tx, 4: Rx, 9: GND, 10: VCC

# Flash this firmware by copying "out/klipper.bin" to a SD card and
# turning on the printer with the card inserted. The firmware
# filename must end in ".bin" and must not match the last filename
# that was flashed.


###########################################################################

[save_variables]
filename = ~/demon_vars.cfg

[idle_timeout]
gcode:
    _DEMON_IDLE_TIMEOUT
timeout: 3600

[delayed_gcode startup] 
initial_duration: 5
gcode:
    T0

[include ./Demon_Klipper_Essentials_Unified/*.cfg]
[include ./Demon_User_Files/*.cfg]
[include ./Demon_Klipper_Essentials_Unified/Other_Files/Demon_User_Files_Updater/Extract_Demon_User_Files_Rpi.cfg]
[include ./KAMP_LiTE/*.cfg]
[include ./Heat_Soak.cfg]
[include mainsail.cfg]
[include My_Macros.cfg]
[include shell_command.cfg]
[include power.cfg]
[include BTT_Eddy.cfg]

##########################
#                        #
#  KCM Required configs  #
#                        #
##########################

[include ./coprint/chromahead.cfg]
[include ./coprint/coprint_macros.cfg]
[include ./coprint/driver.cfg]
[include ./coprint/input_shaper.cfg]
[include ./coprint/start_print.cfg]
[include ./coprint/end_print.cfg]

[virtual_sdcard]
path: /home/pi/printer_data/gcodes
on_error_gcode: PAUSE

[display_status]

[exclude_object]

[printer]
kinematics: corexy
max_velocity: 500    
max_accel: 4500
max_z_velocity: 10
max_z_accel: 100
square_corner_velocity: 5.0 
minimum_cruise_ratio: 0.3 # Value between 0 and 1. Replacement of max_accel_to_decel


[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
#serial: /dev/ttyUSB0 #sudo dmesg -w
#baud: 115200
restart_method: command

[mcu CM4]
serial: /tmp/klipper_host_mcu

###########################################################################

[temperature_sensor Ender-7]
sensor_type: temperature_mcu

[temperature_sensor CM4]
sensor_type: temperature_host


###########################################################################

#Driver, DM542
[stepper_x]
step_pin: PC2
dir_pin: PB9
enable_pin: !PC3
rotation_distance: 32
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: ^PA5
position_min: 0
position_endstop: 0
position_min: 0
position_max: 250
homing_speed: 80

#Driver, DM542
[stepper_y]
step_pin: PB8
dir_pin: !PB7
enable_pin: !PC3
rotation_distance: 32
microsteps: 32
full_steps_per_rotation: 200          #1.8=200, 0.9=400
endstop_pin: ^PA6
position_min: 25
position_endstop: 250
position_max: 250
homing_speed: 80

#Driver, Creality Board (TMC2208) 
[stepper_z]
step_pin: PB6
dir_pin: PB5
enable_pin: !PC3
rotation_distance: 8
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: probe:z_virtual_endstop
position_min: -2.5
position_max: 300
homing_speed: 5
second_homing_speed: 1
homing_retract_dist: 2.0

###########################################################################

[heater_bed]
heater_pin: PA15
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
control: pid
pid_Kp: 75.397
pid_Ki: 1.174
pid_Kd: 1210.128
min_temp: 0
max_temp: 90

###########################################################################

[probe_eddy_current btt_eddy]
sensor_type: ldc1612
#i2c_address:
i2c_mcu: eddy
i2c_bus: i2c0f
# Measure the offsets below using the method described here: https://www.klipper3d.org/Probe_Calibrate.html#calibrating-probe-x-and-y-offsets
x_offset: 30
y_offset: 10
speed: 5
samples: 3 #<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<< MAKES EDDY DO x3 PROBE SAMPLES
samples_result: median #<<<<<<<<<<<<<<<<<<<< THEN THIS USES THE VALUE IN THE MIDDLE
sample_retract_dist: 5.0
samples_tolerance: 0.0095
samples_tolerance_retries: 10
z_offset: 2.880
#reg_drive_current: 16


[mcu eddy]
serial: /dev/serial/by-id/usb-Klipper_rp2040_50443403107C3D1C-if00
restart_method: command

[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu # Sets the type of sensor for Klipper to read
sensor_mcu: eddy # Sets the MCU of the eddy probe tempereature sensor
min_temp: 10 # Sets the minimum tempereature for eddys tempereature sensor to operate
max_temp: 100 # Sets the maximum tempereature for eddys tempereature sensor to operate


[temperature_probe btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26
horizontal_move_z: 2

###########################################################################

#[filament_switch_sensor filament_sensor]
# pause_on_runout: true
# switch_pin: !PA4

# [input_shaper]
# shaper_freq_x: 45.0
# shaper_freq_y: 45.0
# shaper_type_x = 2hump_ei
# shaper_type_y = 3hump_ei

#[gcode_arcs]
#resolution: 1.0

[screws_tilt_adjust]
screw1: 48, 22
screw1_name: front left screw
screw2: 238.00, 22.00
screw2_name: front right screw
screw3: 238, 209
screw3_name: rear right screw
screw4: 48, 209
screw4_name: rear left screw
horizontal_move_z: 10
speed: 50
screw_thread: CW-M3 

[bed_screws]
screw1: 48, 22
screw2: 238, 22
screw3: 238, 209
screw4: 48, 209

[force_move]
enable_force_move: True

[firmware_retraction]
retract_length: 0.35      # Retraction distance in mm (adjust for Bowden)
retract_speed: 37         # Speed of retraction (mm/s)
unretract_extra_length: 0 # Extra filament pushed back after unretraction
unretract_speed: 30       # Speed of unretraction (mm/s)

[include moonraker_obico_macros.cfg]

