# This file contains pin mappings for the stock 2021 Creality Ender 7.
# To use this config, during "make menuconfig" select as below: 

# Klipper Firmware Configuration with Stock Touch screen
# [*] Enable extra low-level configuration options
#    Micro-controller A rchitecture (STMicroelectronics STM32)  --->
#    Processor model (STM32F103)  --->
# [ ] Only 10KiB of RAM (for rare stm32f103x6 variant) (NEW)
# [ ] Disable SWD at startup (for GigaDevice stm32f103 clones) (NEW)
#     Bootloader offset (28KiB bootloader)  --->
#     Clock Reference (8 MHz crystal)  --->
#     Communication interface (Serial (on USART1 PA10/PA9))  --->
# (250000) Baud rate for serial port
# (!PA15) GPIO pins to set at micro-controller startup

# This file contains pin mappings for the stock 2021 Creality Ender 7.
# To use this config, during "make menuconfig" select the
# STM32F103 with a "28KiB bootloader" and serial (on USART1 PA10/PA9)
# communication.

# If you prefer a direct serial connection, in "make menuconfig"
# select "Enable extra low-level configuration options" and select
# serial (on USART3 PB11/PB10), which is broken out on the 10 pin IDC
# cable used for the LCD module as follows:
# 3: Tx, 4: Rx, 9: GND, 10: VCC

# Flash this firmware by copying "out/klipper.bin" to a SD card and
# turning on the printer with the card inserted. The firmware
# filename must end in ".bin" and must not match the last filename
# that was flashed.



###########################################################################

[save_variables]
filename = ~/demon_vars.cfg

[idle_timeout]
gcode:
    _DEMON_IDLE_TIMEOUT
timeout: 3600

[include ./KAMP_LiTE/Demon_BTT_Eddy_Offset.cfg]
[include ./Demon_Klipper_Essentials_Unified/*.cfg]
[include ./Demon_User_Files/*.cfg]
[include ./Demon_Klipper_Essentials_Unified/Other_Files/Demon_User_Files_Updater/Extract_Demon_User_Files_Rpi.cfg]
[include ./KAMP_LiTE/*.cfg]
[include ./Heat_Soak.cfg]
[include mainsail.cfg]
[include My_Macros.cfg]
[include shell_command.cfg]
[include power.cfg]

[virtual_sdcard]
path: /home/pi/printer_data/gcodes
on_error_gcode: PAUSE

[display_status]
[exclude_object]

[printer]
kinematics: corexy
max_velocity: 500                                              # max feedrate (E7:500)(Other:300)
max_accel: 3000
max_z_velocity: 10
max_z_accel: 100
minimum_cruise_ratio: 0.39 # Value between 0 and 1. Replacement of max_accel_to_decel


[mcu]
#serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
serial: /dev/ttyUSB0 #sudo dmesg -w
#baud: 115200
restart_method: command

[mcu CM4]
serial: /tmp/klipper_host_mcu

[temperature_sensor Ender-7]
sensor_type: temperature_mcu

[temperature_sensor CM4]
sensor_type: temperature_host

###########################################################################

#Driver, DM542
[stepper_x]
step_pin: PC2
dir_pin: PB9
enable_pin: !PC3
rotation_distance: 32
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: ^PA5
position_min: 0
position_endstop: 0
position_min: 0
position_max: 233
homing_speed: 80

#Driver, DM542
[stepper_y]
step_pin: PB8
dir_pin: !PB7
enable_pin: !PC3
rotation_distance: 32
microsteps: 32
full_steps_per_rotation: 200          #1.8=200, 0.9=400
endstop_pin: ^PA6
position_min: 0
position_endstop: 250
position_max: 250
homing_speed: 80

#Driver, Creality Board (TMC2208) 
[stepper_z]
step_pin: PB6
dir_pin: PB5
enable_pin: !PC3
rotation_distance: 8
microsteps: 16
full_steps_per_rotation: 200          #1.8=200, 0.9=400
endstop_pin: probe:z_virtual_endstop  
position_min: -2.5
position_max: 300
homing_speed: 5
second_homing_speed: 1
homing_retract_dist: 2.0

#Driver, Creality Board (TMC2208)
[extruder]
step_pin: PB4
dir_pin: !PB3
enable_pin: !PC3
microsteps: 16
rotation_distance: 22.609
full_steps_per_rotation: 200


###########################################################################

[extruder]
filament_diameter: 1.750
nozzle_diameter: 0.300
max_extrude_only_distance: 500.0
pressure_advance: 0.242085
pressure_advance_smooth_time: 0.030
max_extrude_cross_section: 5
instantaneous_corner_velocity: 1.000
heater_pin: PA1
max_power: 1.0
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
pullup_resistor: 4700
smooth_time: 1.0
control: pid
pid_kp: 20.872
pid_ki: 1.200
pid_kd: 90.793
min_extrude_temp: 180
min_temp: 1
max_temp: 245
max_extrude_only_velocity: 15

[heater_bed]
heater_pin: PA15
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
control: pid
pid_Kp: 74.872
pid_Ki: 1.172
pid_Kd: 1196.075
min_temp: 0
max_temp: 80

###########################################################################

[output_pin Printer_Lights]
pin:PC6
pwm: 1
value:1
cycle_time: 0.010

[fan]
pin: PA0  

[filament_switch_sensor filament_sensor]
pause_on_runout: true
switch_pin: !PA4

[adxl345]
cs_pin: CM4:None
spi_bus: spidev0.1
axes_map: z,y,-x


[resonance_tester]
accel_chip: adxl345
probe_points:
    125, 125, 20

[input_shaper]
shaper_freq_x: 45.0
shaper_freq_y: 45.0
shaper_type_x = 2hump_ei
shaper_type_y = 3hump_ei

[gcode_arcs]
#resolution: 1.0

[screws_tilt_adjust]
screw1: 0, 5
screw1_name: front left screw
screw2: 186, 5
screw2_name: front right screw
screw3: 186, 195
screw3_name: rear right screw
screw4: 0, 195
screw4_name: rear left screw
horizontal_move_z: 10.
speed: 50.
screw_thread: CW-M3 


[force_move]
enable_force_move: True

[firmware_retraction]
retract_length: 3.9       # Retraction distance in mm (adjust for Bowden)
retract_speed: 58         # Speed of retraction (mm/s)
unretract_extra_length: 0 # Extra filament pushed back after unretraction
unretract_speed: 45       # Speed of unretraction (mm/s)

[include moonraker_obico_macros.cfg]

