[bed_mesh]
mesh_min: 43, 10
mesh_max: 222, 200
#Change these parameters according to the maximum and minimum values ​​of your printer.
#You may also need to change the stepper_x, stepper_y max and min values ​​on your printer along with the changed values.
#For more information you can visit "https://coprint3d.com/pages/help-center".
algorithm: bicubic
speed: 1000

probe_count: 5,5
horizontal_move_z: 10
split_delta_z: 0.025
fade_start: 0.6
fade_end: 10
fade_target: 0
move_check_distance: 5

[probe]
pin: cp_Head:PA3

x_offset: 33
y_offset: -1.5
speed: 200
lift_speed: 10.0
samples: 1
samples_result: median
sample_retract_dist: 0.5
samples_tolerance: 0.1
samples_tolerance_retries: 10