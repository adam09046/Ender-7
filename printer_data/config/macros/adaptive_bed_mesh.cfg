[bed_mesh]
speed: 50 
horizontal_move_z: 2
mesh_min: 45, 14 
mesh_max: 257, 254
probe_count: 50, 50 
algorithm: bicubic
#scan_overshoot: 8  #uncomment this section if you still have room left over on the X axis for some scan overshoot to product smoother movements and more accurate scanning. Uncommenting this should be fine if you are using a standard voron mount.


[gcode_macro ADAPTIVE_BED_MESH]
gcode:
    # Calculate overlap (adjust the threshold as needed)
    {% set x_overlap = min(last_print_max_x, first_layer_print_max[0]) - max(last_print_min_x, first_layer_print_min[0]) %}
    {% set y_overlap = min(last_print_max_y, first_layer_print_max[1]) - max(last_print_min_y, first_layer_print_min[1]) %}
    {% if x_overlap > 50 and y_overlap > 50 %}
        ; Sufficient overlap, reuse existing mesh
        {action_respond_info("Reusing previous bed mesh")}
    {% else %}
        ; Not enough overlap, generate new mesh
        BED_MESH_CLEAR
        BED_MESH_CALIBRATE METHOD=rapid_scan ADAPTIVE=1 ADAPTIVE_MARGIN=5
    {% endif %}